<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Apply for Job | Moon HealthCare Group Limited</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2ff, #f0f9ff, #ecfeff);
            color: #111;
        }

        /* PARTICLES LAYER */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -2;
        }

        /* GLOW EFFECT */
        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
        }

        body::before {
            top: -100px;
            left: -100px;
            background: #c7d2fe;
        }

        body::after {
            bottom: -120px;
            right: -120px;
            background: #bae6fd;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 8%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            position: relative;
            z-index: 1000;
        }

        .logo {
            color: #4f46e5;
            font-weight: 700;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #444;
            font-size: 14px;
        }

        .btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* APPLY SECTION */
        .section {
            padding: 80px 8%;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }

        .form-card {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeUp 0.8s ease;
        }

        .form-card h2 {
            margin-bottom: 10px;
            text-align: center;
        }

        .form-card p {
            color: #666;
            margin-bottom: 25px;
            text-align: center;
        }

        /* INPUTS */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        /* SUBMIT */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ANIMATION */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .form-card {
                padding: 25px;
            }
        }
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-content {
    background: white;
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    animation: popIn 0.4s ease;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

.checkmark {
    font-size: 50px;
    color: #22c55e;
    margin-bottom: 10px;
    animation: bounce 0.6s ease;
}

@keyframes popIn {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes bounce {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
}
.loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
}

.loader-box {
    background: white;
    padding: 25px 40px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    animation: popIn 0.3s ease;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e7eb;
    border-top: 4px solid #4f46e5;
    border-radius: 50%;
    margin: 0 auto 10px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
    </style>
</head>

<body>

<div id="particles-js"></div>

<header>
    <div class="logo">Moon HealthCare</div>
    <button class="btn" onclick="location.href='/index.html'">Back Home</button>
</header>

<section class="section">

    <div class="form-card">
        <h2>Message Us</h2>
        <p>Fill in your details and submit your application. Our team will contact you shortly.</p>

      <form id="applicationForm">

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" name="phone" required>
    </div>

 


    <div class="form-group">
        <label>Cover Message</label>
        <textarea id="message" name="message" placeholder="Tell us about yourself..."></textarea>
    </div>

    <button type="submit" class="submit-btn">Submit Application</button>

</form>
    </div>

</section>
<div id="successPopup" class="popup">
    <div class="popup-content">
        <div class="checkmark">✔</div>
        <h3>Application Sent!</h3>
        <p>We’ve received your application successfully.</p>
    </div>
</div>
<div id="loadingPopup" class="loading">
    <div class="loader-box">
        <div class="spinner"></div>
        <p>Sending application...</p>
        <small>Please wait</small>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
    particles: {
        number: {
            value: 95,
            density: { enable: true, value_area: 700 }
        },
        color: {
            value: "#3b82f6"
        },
        shape: {
            type: "circle"
        },
        opacity: {
            value: 0.7,
            random: true
        },
        size: {
            value: 4.5,
            random: true
        },
        line_linked: {
            enable: true,
            distance: 120,
            color: "#93c5fd",
            opacity: 0.6,
            width: 1.2
        },
        move: {
            enable: true,
            speed: 2.5,
            direction: "none",
            random: true,
            straight: false,
            out_mode: "out",
            attract: {
                enable: true,
                rotateX: 600,
                rotateY: 1200
            }
        }
    },

    interactivity: {
        detect_on: "window",
        events: {
            onhover: {
                enable: true,
                mode: "repulse"
            },
            onclick: {
                enable: true,
                mode: "push"
            },
            resize: true
        },
        modes: {
            repulse: {
                distance: 180,
                duration: 0.4
            },
            push: {
                particles_nb: 6
            }
        }
    },

    retina_detect: true
});
</script>
<script>
document.getElementById("applicationForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const loading = document.getElementById("loadingPopup");
    loading.style.display = "flex"; // show loader

    emailjs.send("service_2gp7w5i", "template_ztj6t57", {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        message: document.getElementById("message").value,
        to_email: "enquiries@moonhealthcare.co.uk"
    })
    .then(() => {
        loading.style.display = "none"; // hide loader
        document.getElementById("successPopup").style.display = "flex";
        document.getElementById("applicationForm").reset();

        setTimeout(() => {
            document.getElementById("successPopup").style.display = "none";
        }, 3000);
    })
    .catch((error) => {
        loading.style.display = "none"; // hide loader
        alert("Failed to send application.");
        console.log(error);
    });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
  emailjs.init("VPWtYdqtS0_pDqdQx"); // replace this
</script>
</body>
</html>
